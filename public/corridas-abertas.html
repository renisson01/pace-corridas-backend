<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Corridas Abertas — PACE BRAZIL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:linear-gradient(135deg,#92400e,#f59e0b);padding:20px;text-align:center}
.header h1{font-size:1.8rem}
.header p{opacity:.8;font-size:.85rem}
.container{max-width:600px;margin:0 auto;padding:16px}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filtros select{background:#1a1a2e;color:#fff;border:1px solid #333;padding:8px 12px;border-radius:8px;font-size:.85rem}
.corrida-card{background:#1a1a2e;border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid #f59e0b}
.corrida-card h3{font-size:1.05rem;margin-bottom:6px}
.corrida-card .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.8rem;color:#888;margin-bottom:10px}
.corrida-card .meta span{display:flex;align-items:center;gap:3px}
.dist-tags{display:flex;gap:6px;margin-bottom:12px}
.dist-tag{background:#f59e0b22;color:#f59e0b;padding:3px 10px;border-radius:14px;font-size:.75rem;font-weight:600}
.btn-inscrever{display:inline-block;background:#f59e0b;color:#000;padding:8px 20px;border-radius:20px;text-decoration:none;font-weight:700;font-size:.85rem}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #333}
.bottom-nav a{color:#666;text-decoration:none;font-size:.7rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
</style>
</head>
<body>
<div class="header">
  <h1>🏁 Corridas Abertas</h1>
  <p>Encontre sua próxima corrida e inscreva-se</p>
</div>
<div class="container">
  <div class="filtros">
    <select id="filtroEstado" onchange="carregar()">
      <option value="">Todos os estados</option>
      <option value="SE">Sergipe</option><option value="BA">Bahia</option>
      <option value="SP">São Paulo</option><option value="RJ">Rio de Janeiro</option>
      <option value="MG">Minas Gerais</option><option value="PE">Pernambuco</option>
      <option value="CE">Ceará</option><option value="AL">Alagoas</option>
    </select>
    <select id="filtroDist" onchange="carregar()">
      <option value="">Todas distâncias</option>
      <option value="5km">5km</option><option value="10km">10km</option>
      <option value="21km">Meia Maratona</option><option value="42km">Maratona</option>
    </select>
  </div>
  <div id="lista">Carregando corridas...</div>
</div>
<nav class="bottom-nav">
  <a href="/" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Início</span></a>
  <a href="/corridas-abertas.html" class="nav-item ativo"><span class="nav-icon">🏁</span><span class="nav-label">Corridas</span></a>
  <a href="/treinador.html" class="nav-item"><span class="nav-icon">🏃</span><span class="nav-label">Treinador</span></a>
  <a href="/elite.html" class="nav-item"><span class="nav-icon">🏆</span><span class="nav-label">Ranking</span></a>
  <a href="/comunidades.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Grupos</span></a>
</nav>
<script>
async function carregar() {
  const estado = document.getElementById('filtroEstado').value;
  const dist = document.getElementById('filtroDist').value;
  let url = '/corridas-abertas?';
  if (estado) url += 'estado=' + estado + '&';
  if (dist) url += 'distancia=' + dist + '&';
  try {
    const res = await fetch(url);
    const data = await res.json();
    const lista = document.getElementById('lista');
    if (!data.length) { lista.innerHTML = '<p style="text-align:center;color:#666;padding:40px">Nenhuma corrida encontrada. Em breve teremos mais!</p>'; return; }
    lista.innerHTML = data.map(c => {
      const dt = new Date(c.data);
      const dataStr = dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      const dists = c.distancias.split(',').map(d => '<span class="dist-tag">'+d.trim()+'</span>').join('');
      return `<div class="corrida-card">
        <h3>${c.nome}</h3>
        <div class="meta">
          <span>📅 ${dataStr}</span>
          <span>📍 ${c.cidade}/${c.estado}</span>
          ${c.preco ? '<span>💰 R$ '+c.preco.toFixed(2)+'</span>' : '<span>💚 Gratuita</span>'}
        </div>
        <div class="dist-tags">${dists}</div>
        <span class="btn-inscrever" style="opacity:0.5;cursor:default">Em breve</span>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}
carregar();
</script>
</body>
</html>
