<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corridas Realizadas — REGENI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--verde:#00ff87;--bg:#0a0a0a;--bg2:#141414;--border:#1F2937;--text:#F1F5F9;--muted:#64748B}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding-bottom:80px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(8,11,16,0.98);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:22px;color:var(--verde);text-decoration:none;letter-spacing:2px}
.hero{background:linear-gradient(135deg,#0d2818,#065f46);padding:24px 18px;text-align:center}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:900}
.hero p{color:rgba(255,255,255,0.7);font-size:14px;margin-top:4px}
.container{max-width:600px;margin:0 auto;padding:16px}
.race-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;cursor:pointer;transition:all 0.2s;border-left:4px solid var(--verde)}
.race-card:hover{border-color:var(--verde);transform:translateY(-2px)}
.race-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:900;margin-bottom:6px}
.race-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:10px}
.race-dists{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dist-tag{background:rgba(247,147,26,0.1);color:var(--verde);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.race-stats{display:flex;gap:16px;font-size:12px;color:var(--muted)}
.race-stats span{display:flex;align-items:center;gap:4px}
.btn-ver{display:inline-block;background:var(--verde);color:#0a0a0a;padding:10px 24px;border-radius:24px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:900;text-decoration:none;margin-top:10px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,11,16,0.98);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;z-index:100}
.bottom-nav a{color:var(--muted);text-decoration:none;font-size:10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav a.ativo{color:var(--verde)}
</style>
<link rel="stylesheet" href="/regeni.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00ff87">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">REGENI</a>
  <span style="font-size:14px;font-weight:700">📋 Resultados</span>
</div>
<div class="hero">
  <h1>🏁 Corridas Realizadas</h1>
  <p>Resultados oficiais das provas</p>
</div>
<div class="container">
  <div id="lista"><div class="empty">⏳ Carregando...</div></div>
</div>

<script>
async function carregar(){
  try{
    const res=await fetch('/races');
    const races=await res.json();
    const lista=document.getElementById('lista');
    if(!races.length){lista.innerHTML='<div class="empty">Nenhuma corrida ainda</div>';return}
    let html='';
    for(const r of races){
      const resCount=await fetch('/results/race/'+r.id).then(r=>r.json()).then(d=>d.length).catch(()=>0);
      if(resCount===0) continue;
      const dt=new Date(r.date);
      const dataStr=dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      const dists=r.distances?r.distances.split(',').map(d=>'<span class="dist-tag">'+d.trim()+'</span>').join(''):'';
      html+=`<div class="race-card" onclick="location.href='/resultados.html?raceId=${r.id}&nome=${encodeURIComponent(r.name)}'">
        <div class="race-name">${r.name}</div>
        <div class="race-meta">
          <span>📅 ${dataStr}</span>
          <span>📍 ${r.city}/${r.state}</span>
        </div>
        <div class="race-dists">${dists}</div>
        <div class="race-stats">
          <span>👥 ${resCount} resultados</span>
          <span>🏢 ${r.organizer||''}</span>
        </div>
        <a class="btn-ver">Ver resultados →</a>
      </div>`;
    }
    if(!html) html='<div class="empty">Nenhuma corrida com resultados ainda</div>';
    lista.innerHTML=html;
  }catch(e){console.error(e)}
}
carregar();
</script>

<!-- REGENI NAV -->
<style>
.pace-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,6,11,.97);backdrop-filter:blur(12px);border-top:1px solid #2a2a2a;display:flex;z-index:9999;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.pace-nav a{flex:1;text-align:center;padding:6px 0;text-decoration:none;color:#556677;font-size:10px;font-weight:600;font-family:'Space Grotesk',system-ui,sans-serif;transition:color .2s}
.pace-nav a.active{color:#00ff87}
.pace-nav a .ni{font-size:20px;display:block;margin-bottom:1px}
body{padding-bottom:64px!important}
</style>
<nav style="position:fixed;bottom:0;left:0;right:0;background:#0A0A1A;border-top:1px solid #1a1a2e;display:flex;justify-content:space-around;padding:8px 0;z-index:1000;">
  <a href="/resultados.html" style="text-align:center;text-decoration:none;color:#666;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <span style="font-size:20px;">🔍</span>Resultados
  </a>
  <a href="/corridas-abertas.html" style="text-align:center;text-decoration:none;color:#00ff87;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <span style="font-size:20px;">🏁</span>Corridas
  </a>
  <a href="/perfil-atleta.html" style="text-align:center;text-decoration:none;color:#666;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <span style="font-size:20px;">👤</span>Perfil
  </a>
  <a href="/" style="text-align:center;text-decoration:none;color:#666;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;">
    <span style="font-size:20px;">ℹ️</span>Sobre
  </a>
</nav>
<script>
(function(){var p=location.pathname;var logged=!!localStorage.getItem('pace_token');document.querySelectorAll('.pace-nav a').forEach(function(a){if(a.classList.contains('n-home')&&logged){a.href='/atleta.html';}if(p===a.getAttribute('href')||(p==='/atleta.html'&&a.classList.contains('n-home'))||(p==='/exames.html'&&a.classList.contains('n-cobaia'))||(p==='/cobaia-resultados.html'&&a.classList.contains('n-cobaia')))a.classList.add('active');});})();
</script>
<!-- /REGENI NAV -->
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<style>
.rg-bottom-nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(20,20,20,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom,0px);z-index:1000}
.rg-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:#555;font-size:10px;font-weight:700;font-family:'Space Grotesk',system-ui,sans-serif;letter-spacing:.3px;transition:color .2s;padding:4px 0}
.rg-nav-item span:first-child{font-size:22px;line-height:1}
.rg-nav-item.active,.rg-nav-item:hover{color:#00ff87}
</style>
<nav class="rg-bottom-nav">
  <a href="/" class="rg-nav-item"><span>🏠</span><span>Início</span></a>
  <a href="/resultados.html" class="rg-nav-item"><span>🔍</span><span>Resultados</span></a>
  <a href="/atleta.html" class="rg-nav-item"><span>👤</span><span>Atleta</span></a>
  <a href="/corridas-abertas.html" class="rg-nav-item"><span>🏁</span><span>Corridas</span></a>
</nav>
</body>
</html>
