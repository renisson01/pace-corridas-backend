<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GPS Tracker — PACE BRAZIL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#3b82f6);padding:20px;text-align:center}
.header h1{font-size:1.8rem}
.header p{opacity:.8;font-size:.85rem}
.container{max-width:600px;margin:0 auto;padding:16px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#1a1a2e;border-radius:14px;padding:16px;text-align:center}
.stat-card .valor{font-size:1.8rem;font-weight:800;color:#3b82f6}
.stat-card .label{font-size:.75rem;color:#888;margin-top:4px}
.big-btn{width:100%;padding:20px;border-radius:50px;border:none;font-size:1.3rem;font-weight:800;cursor:pointer;margin-bottom:16px;transition:.3s}
.btn-start{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-start:hover{transform:scale(1.02)}
.btn-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.tracker{display:none;text-align:center;padding:20px}
.tracker .tempo{font-size:3rem;font-weight:800;font-variant-numeric:tabular-nums;margin:10px 0}
.tracker .dist{font-size:1.5rem;color:#10b981;font-weight:700}
.tracker .pace{font-size:1.1rem;color:#888;margin-top:4px}
.historico{margin-top:20px}
.historico h3{margin-bottom:12px;color:#aaa}
.ativ{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.ativ .esq .titulo{font-weight:600;font-size:.95rem}
.ativ .esq .data{font-size:.75rem;color:#666;margin-top:2px}
.ativ .dir{text-align:right}
.ativ .dir .km{font-size:1.3rem;font-weight:800;color:#3b82f6}
.ativ .dir .pace{font-size:.8rem;color:#888}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #333}
.bottom-nav a{color:#666;text-decoration:none;font-size:.7rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav a.active{color:#3b82f6}
</style>
</head>
<body>
<div class="header">
  <h1>📡 GPS Tracker</h1>
  <p>Registre seus treinos e evolua</p>
</div>
<div class="container">
  <div id="statsArea" class="stats-grid">
    <div class="stat-card"><div class="valor" id="totalKm">0</div><div class="label">KM TOTAL</div></div>
    <div class="stat-card"><div class="valor" id="totalAtiv">0</div><div class="label">ATIVIDADES</div></div>
    <div class="stat-card"><div class="valor" id="semanaKm">0</div><div class="label">KM SEMANA</div></div>
    <div class="stat-card"><div class="valor" id="totalCal">0</div><div class="label">CALORIAS</div></div>
  </div>

  <div id="preTracker">
    <button class="big-btn btn-start" onclick="iniciarGPS()">▶ INICIAR CORRIDA</button>
  </div>

  <div id="tracker" class="tracker">
    <div class="tempo" id="timer">00:00:00</div>
    <div class="dist"><span id="distancia">0.00</span> km</div>
    <div class="pace">Pace: <span id="paceAtual">--:--</span> /km</div>
    <br>
    <button class="big-btn btn-stop" onclick="pararGPS()">⏹ PARAR E SALVAR</button>
  </div>

  <div class="historico" id="historico">
    <h3>📋 Últimas Atividades</h3>
    <div id="listaAtiv">Carregando...</div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/">🏠<span>Home</span></a>
  <a href="/comunidades.html">🏘️<span>Grupos</span></a>
  <a href="/gps.html" class="active">📡<span>GPS</span></a>
  <a href="/social.html">💬<span>Social</span></a>
  <a href="/perfil.html">👤<span>Perfil</span></a>
</nav>

<script>
const API = '';
const token = localStorage.getItem('pace_token');
const headers = { 'Content-Type': 'application/json' };
if (token) headers['Authorization'] = 'Bearer ' + token;

let watchId = null;
let pontos = [];
let startTime = null;
let timerInterval = null;
let distTotal = 0;

function toRad(d) { return d * Math.PI / 180; }
function haversine(lat1,lon1,lat2,lon2) {
  const R=6371; const dLat=toRad(lat2-lat1); const dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtTime(sec) {
  const h=Math.floor(sec/3600); const m=Math.floor((sec%3600)/60); const s=Math.floor(sec%60);
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function calcPace(km,sec) {
  if(km<=0) return '--:--';
  const p=sec/km; const m=Math.floor(p/60); const s=Math.floor(p%60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function iniciarGPS() {
  if (!token) { alert('Faça login primeiro!'); location.href='/entrar.html'; return; }
  if (!navigator.geolocation) { alert('GPS não disponível neste dispositivo'); return; }

  pontos = []; distTotal = 0; startTime = Date.now();
  document.getElementById('preTracker').style.display = 'none';
  document.getElementById('tracker').style.display = 'block';
  document.getElementById('historico').style.display = 'none';

  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    document.getElementById('timer').textContent = fmtTime(elapsed);
  }, 1000);

  watchId = navigator.geolocation.watchPosition(pos => {
    const p = { lat: pos.coords.latitude, lng: pos.coords.longitude, alt: pos.coords.altitude, ts: Date.now() };
    if (pontos.length > 0) {
      const last = pontos[pontos.length - 1];
      const d = haversine(last.lat, last.lng, p.lat, p.lng);
      if (d > 0.003) { // mín 3m pra filtrar ruído
        distTotal += d;
        pontos.push(p);
      }
    } else {
      pontos.push(p);
    }
    document.getElementById('distancia').textContent = distTotal.toFixed(2);
    const elapsed = (Date.now() - startTime) / 1000;
    document.getElementById('paceAtual').textContent = calcPace(distTotal, elapsed);
  }, err => console.warn('GPS erro:', err.message), {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 10000
  });
}

async function pararGPS() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (timerInterval) clearInterval(timerInterval);

  const duracaoSeg = Math.floor((Date.now() - startTime) / 1000);

  if (distTotal < 0.01) { alert('Distância muito curta. Tente novamente.'); resetUI(); return; }

  try {
    const body = {
      tipo: 'corrida',
      distanciaKm: parseFloat(distTotal.toFixed(3)),
      duracaoSeg,
      pontosRota: pontos,
      inicioLat: pontos[0]?.lat, inicioLng: pontos[0]?.lng,
      fimLat: pontos[pontos.length-1]?.lat, fimLng: pontos[pontos.length-1]?.lng,
      iniciadoEm: new Date(startTime).toISOString(),
      finalizadoEm: new Date().toISOString(),
      compartilhado: true
    };

    const res = await fetch(API + '/gps/atividade', { method: 'POST', headers, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) {
      alert(`✅ Atividade salva!\n${data.atividade.distanciaKm} km | Pace ${data.atividade.paceMedio}\n+${data.atividade.pontosGanhos} pontos!\nTotal acumulado: ${data.kmTotal} km`);
    } else {
      alert('Erro: ' + (data.error || 'Tente novamente'));
    }
  } catch(e) { alert('Erro ao salvar: ' + e.message); }

  resetUI();
  carregarStats();
  carregarHistorico();
}

function resetUI() {
  document.getElementById('preTracker').style.display = 'block';
  document.getElementById('tracker').style.display = 'none';
  document.getElementById('historico').style.display = 'block';
  document.getElementById('timer').textContent = '00:00:00';
  document.getElementById('distancia').textContent = '0.00';
  document.getElementById('paceAtual').textContent = '--:--';
}

async function carregarStats() {
  if (!token) return;
  try {
    const res = await fetch(API + '/gps/stats', { headers });
    const d = await res.json();
    document.getElementById('totalKm').textContent = d.totalKm || 0;
    document.getElementById('totalAtiv').textContent = d.totalAtividades || 0;
    document.getElementById('semanaKm').textContent = d.semana?.km || 0;
    document.getElementById('totalCal').textContent = d.totalCalorias || 0;
  } catch(e) {}
}

async function carregarHistorico() {
  if (!token) { document.getElementById('listaAtiv').innerHTML = '<p style="color:#666">Faça login para ver seu histórico</p>'; return; }
  try {
    const res = await fetch(API + '/gps/atividades?limit=5', { headers });
    const data = await res.json();
    if (!data.length) { document.getElementById('listaAtiv').innerHTML = '<p style="color:#666">Nenhuma atividade ainda. Comece sua primeira corrida!</p>'; return; }
    document.getElementById('listaAtiv').innerHTML = data.map(a => {
      const dt = new Date(a.iniciadoEm);
      const dataStr = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      return `<div class="ativ"><div class="esq"><div class="titulo">${a.titulo||'🏃 Corrida'}</div><div class="data">${dataStr}</div></div><div class="dir"><div class="km">${a.distanciaKm.toFixed(2)} km</div><div class="pace">${a.paceMedio || '--'} /km</div></div></div>`;
    }).join('');
  } catch(e) {}
}

carregarStats();
carregarHistorico();
</script>
</body>
</html>
