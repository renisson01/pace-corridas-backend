<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGENI - Ranking Brasil</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00D4FF">
</head>
<body class="bg-slate-900 text-white min-h-screen pb-20">
<div class="max-w-5xl mx-auto p-4">
  <h1 class="text-3xl font-bold text-center py-6">🏆 REGENI — Ranking Brasil</h1>
  
  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="bg-slate-800 rounded-xl p-4 text-center">
      <div class="text-2xl font-bold text-blue-400" id="totalRaces">-</div>
      <div class="text-xs text-slate-400">Corridas</div>
    </div>
    <div class="bg-slate-800 rounded-xl p-4 text-center">
      <div class="text-2xl font-bold text-green-400" id="totalResults">-</div>
      <div class="text-xs text-slate-400">Resultados</div>
    </div>
    <div class="bg-slate-800 rounded-xl p-4 text-center">
      <div class="text-2xl font-bold text-yellow-400" id="totalAthletes">-</div>
      <div class="text-xs text-slate-400">Atletas</div>
    </div>
  </div>

  <div class="bg-slate-800 rounded-xl p-4 mb-4 grid grid-cols-2 md:grid-cols-4 gap-3">
    <select id="rdist" class="bg-slate-700 rounded-lg px-3 py-2 text-sm border border-slate-600">
      <option value="5">5km</option>
      <option value="10" selected>10km</option>
      <option value="21">21km</option>
      <option value="42">42km</option>
    </select>
    <select id="rgen" class="bg-slate-700 rounded-lg px-3 py-2 text-sm border border-slate-600">
      <option value="">Todos</option>
      <option value="M">Masc</option>
      <option value="F">Fem</option>
    </select>
    <select id="rstate" class="bg-slate-700 rounded-lg px-3 py-2 text-sm border border-slate-600">
      <option value="">Todos estados</option>
      <option value="SE">Sergipe</option>
      <option value="AL">Alagoas</option>
      <option value="BA">Bahia</option>
    </select>
    <button onclick="buscarRanking()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-bold">Buscar</button>
  </div>

  <div id="rankres" class="bg-slate-800 rounded-xl p-8 text-center text-slate-400">
    Clique em "Buscar" para ver o ranking
  </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 flex">
  <a href="/" class="flex-1 text-center py-3 text-xs font-bold text-slate-400 hover:text-blue-400">🏠 INÍCIO</a>
  <a href="/corridas-abertas.html" class="flex-1 text-center py-3 text-xs font-bold text-slate-400 hover:text-blue-400">🏁 CORRIDAS</a>
  <a href="/ia.html" class="flex-1 text-center py-3 text-xs font-bold text-slate-400 hover:text-blue-400">🤖 IA</a>
  <a href="/ranking-simples.html" class="flex-1 text-center py-3 text-xs font-bold text-blue-400">🏆 RANKING</a>
  <a href="/perfil.html" class="flex-1 text-center py-3 text-xs font-bold text-slate-400 hover:text-blue-400">👤 PERFIL</a>
</nav>

<script>
const M=['🥇','🥈','🥉'];

async function init() {
  try {
    const s = await fetch('/analytics/overview').then(r => r.json());
    document.getElementById('totalRaces').textContent = s.totalRaces || 0;
    document.getElementById('totalResults').textContent = s.totalResults || 0;
    document.getElementById('totalAthletes').textContent = s.totalAthletes || 0;
  } catch (e) {
    console.error('Stats load failed:', e);
  }
}

async function buscarRanking() {
  const dist = document.getElementById('rdist').value;
  const gen = document.getElementById('rgen').value;
  const state = document.getElementById('rstate').value;
  
  const el = document.getElementById('rankres');
  el.innerHTML = '<p class="text-slate-400">Carregando...</p>';
  
  try {
    let url = '/ranking/' + (dist || '10') + 'km';
    if (gen) url += '?genero=' + gen;
    
    const d = await fetch(url).then(r => r.json());
    
    if (!d || !Array.isArray(d) || d.length === 0) {
      el.innerHTML = '<div class="bg-slate-800 rounded-xl p-8 text-center text-slate-400">📭 Sem resultados</div>';
      return;
    }
    
    let filtered = d;
    if (state) {
      filtered = d.filter(r => r.state === state);
    }
    
    if (filtered.length === 0) {
      el.innerHTML = '<div class="bg-slate-800 rounded-xl p-8 text-center text-slate-400">📭 Nenhum resultado para ' + state + '</div>';
      return;
    }
    
    el.innerHTML = '<div class="bg-slate-800 rounded-xl overflow-hidden"><div class="p-4 border-b border-slate-700"><h3 class="font-bold">🇧🇷 Ranking ' + dist + 'km</h3><p class="text-slate-400 text-sm">' + filtered.length + ' atletas</p></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-700"><tr><th class="px-3 py-2 text-left">#</th><th class="px-3 py-2 text-left">Atleta</th><th class="px-3 py-2">G</th><th class="px-3 py-2 text-left">Estado</th><th class="px-3 py-2 text-left">Tempo</th></tr></thead><tbody>' + 
    filtered.slice(0, 100).map(r => '<tr class="border-t border-slate-700"><td class="px-3 py-2 font-bold ' + (r.posicao <= 3 ? 'text-yellow-400' : 'text-slate-400') + '">' + (M[r.posicao - 1] || r.posicao) + '</td><td class="px-3 py-2 font-medium">' + r.name + '</td><td class="px-3 py-2 text-center"><span class="' + (r.gender === 'F' ? 'text-pink-400' : 'text-blue-400') + '">' + r.gender + '</span></td><td class="px-3 py-2 text-slate-400 text-xs">' + (r.state || '') + '</td><td class="px-3 py-2 font-mono font-bold text-green-400">' + r.melhorTempo + '</td></tr>').join('') + 
    '</tbody></table></div></div>';
  } catch (e) {
    console.error('Ranking error:', e);
    el.innerHTML = '<div class="bg-slate-800 rounded-xl p-8 text-center text-red-400">❌ Erro ao carregar ranking</div>';
  }
}

init();
</script>
</body>
</html>
