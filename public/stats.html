<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACE - Estatísticas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
  <header class="bg-gradient-to-r from-orange-600 to-red-700 text-white py-6 shadow-lg">
    <div class="container mx-auto px-4">
      <h1 class="text-3xl font-black">📊 PACE - Estatísticas</h1>
      <p class="text-orange-100 text-sm">Dados em tempo real do maior agregador do Brasil</p>
    </div>
  </header>

  <div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl p-6 text-white shadow-lg">
        <div class="text-4xl font-black" id="totalRaces">-</div>
        <div class="text-sm mt-1">Total de Corridas</div>
      </div>
      <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-xl p-6 text-white shadow-lg">
        <div class="text-4xl font-black" id="totalAthletes">-</div>
        <div class="text-sm mt-1">Atletas Cadastrados</div>
      </div>
      <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-xl p-6 text-white shadow-lg">
        <div class="text-4xl font-black" id="totalResults">-</div>
        <div class="text-sm mt-1">Resultados</div>
      </div>
      <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl p-6 text-white shadow-lg">
        <div class="text-4xl font-black" id="growth">-</div>
        <div class="text-sm mt-1">Corridas (30 dias)</div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white rounded-xl p-6 shadow-lg">
        <h2 class="text-xl font-bold mb-4">Corridas por Estado</h2>
        <canvas id="stateChart"></canvas>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-lg">
        <h2 class="text-xl font-bold mb-4">Top 10 Cidades</h2>
        <canvas id="cityChart"></canvas>
      </div>
    </div>

    <div class="mt-6 text-center">
      <a href="/" class="text-orange-600 font-bold hover:underline">← Voltar para o início</a>
    </div>
  </div>

  <script>
    const API = 'https://web-production-990e7.up.railway.app';

    async function loadStats() {
      const [overview, growth] = await Promise.all([
        fetch(`${API}/analytics/overview`).then(r => r.json()),
        fetch(`${API}/analytics/growth`).then(r => r.json())
      ]);

      document.getElementById('totalRaces').textContent = overview.totalRaces;
      document.getElementById('totalAthletes').textContent = overview.totalAthletes;
      document.getElementById('totalResults').textContent = overview.totalResults;
      document.getElementById('growth').textContent = growth.racesLast30Days;

      // Gráfico de Estados
      new Chart(document.getElementById('stateChart'), {
        type: 'bar',
        data: {
          labels: overview.stateDistribution.map(s => s.state),
          datasets: [{
            label: 'Corridas',
            data: overview.stateDistribution.map(s => s._count.state),
            backgroundColor: 'rgba(249, 115, 22, 0.8)'
          }]
        }
      });

      // Gráfico de Cidades
      new Chart(document.getElementById('cityChart'), {
        type: 'doughnut',
        data: {
          labels: overview.topCities.map(c => c.city),
          datasets: [{
            data: overview.topCities.map(c => c._count.city),
            backgroundColor: [
              '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
              '#ec4899', '#14b8a6', '#f97316', '#06b6d4', '#84cc16'
            ]
          }]
        }
      });
    }

    loadStats();
  </script>

<!-- PACE NAV -->
<style>
.pace-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,6,11,.97);backdrop-filter:blur(12px);border-top:1px solid #1e2d3d;display:flex;z-index:9999;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.pace-nav a{flex:1;text-align:center;padding:6px 0;text-decoration:none;color:#556677;font-size:10px;font-weight:600;font-family:'Space Grotesk',system-ui,sans-serif;transition:color .2s}
.pace-nav a.active{color:#F7931A}
.pace-nav a .ni{font-size:20px;display:block;margin-bottom:1px}
body{padding-bottom:64px!important}
</style>
<nav class="pace-nav">
<a href="/" class="n-home"><span class="ni">🏠</span>INÍCIO</a>
<a href="/corridas-abertas.html" class="n-corridas"><span class="ni">🏁</span>CORRIDAS</a>
<a href="/ia.html" class="n-ia"><span class="ni">🤖</span>IA</a>
<a href="/cobaia.html" class="n-cobaia"><span class="ni">🧬</span>COBAIA</a>
<a href="/perfil.html" class="n-perfil"><span class="ni">👤</span>PERFIL</a>
</nav>
<script>
(function(){var p=location.pathname;document.querySelectorAll('.pace-nav a').forEach(function(a){if(p===a.getAttribute('href')||(p==='/atleta.html'&&a.classList.contains('n-home'))||(p==='/exames.html'&&a.classList.contains('n-cobaia'))||(p==='/cobaia-resultados.html'&&a.classList.contains('n-cobaia')))a.classList.add('active');});})();
</script>
<!-- /PACE NAV -->
</body>
</html>
